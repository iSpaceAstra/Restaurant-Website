<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <link rel="stylesheet" href="orderpage.css">
</head>

<body>
    <div class="body-container">
        <div class="title-part">
            <hr class="main-line">
            <hr class="side-line">
            <ul class="situation-box">
                <a href="#" class="box">
                    <li>1</li><span>Menü</span>
                </a>
                <a href="#" class="box" style="width: 3.2rem; height: 3.2rem;">
                    <li>2</li><span style="top: 3.">Sepet</span>
                </a>
                <a href="#" class="box"
                    style="background-color: rgb(249,245,233); color: darkslategray; border: 1px solid darkslategray; box-shadow: 0px 0px 12px 0.005px rgb(223,223,223)">
                    <li>3</li><span>Ödeme</span>
                </a>
            </ul>
        </div>
        <div class="content-part">
            <span class="title">Sepetim<span class="meals-amount">( Ürün)</span></span>
            <div class="content">
                <div class="meals">
                    <ul class="meal-list">
                        <li class="meal">
                            <span class="img"></span>
                            <span class="title"></span>
                            <span class="desc"></span>
                            <span class="amount"></span>
                        </li>
                    </ul>
                </div>
                <div class="result">
                    <span class="title">Sepet Özeti</span>
                    <span class="sum">
                        <p id="subtotal"><span class="text-1">Ara Toplam</span> <span class="price"><span
                                    id="price"></span>TL</span></p>
                        <p id="tip"><span class="text-1">Bahşiş</span> <span class="tips"><span
                                    id="fee"></span>TL</span></p>
                    </span>
                    <span class="tip">
                        <span class="text">Bahşiş Ekle (Opsiyonel)</span>
                        <ul>
                            <a href="#"><li>+10</li></a>
                            <a href="#"> <li>+20</li></a>
                            <a href="#"><li>+50</li></a>
                            <a href="#"><li>+100</li></a>
                        </ul>
                    </span>
                    <span class="purchase">
                        <p class="total"><span class="text">Toplam</span><span class="price"><span id="price"></span>TL</span></p>
                        <a href="javascript:void(0);" class="buy">Ödeme Yap</a>
                    </span>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
