                    <li>3</li><span>Ödeme</span>
                </a>
            </ul>
        </div>
        <div class="content-part">
            <span class="title">Sepetim<span class="meals-amount">( Ürün)</span></span>
            <div class="content">

                                </span>
                        </li> -->

                <div class="result">
                    <span class="title">Sepet Özeti</span>
                    <span class="sum">
                        <p id="subtotal"><span class="text-1">Ara Toplam</span> <span class="price"><span
                                    id="price"></span>TL</span></p>
                        <p id="tip"><span class="text-1">Bahşiş</span> <span class="tips"><span

                    <span class="tip">

                    <span class="purchase">
