<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sunset Roasters | Sipariş Sistemi</title>

    <link rel="shortcut icon" href="img/SunsetRoastersLogo.png" type="img/png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Chicle&display=swap" rel="stylesheet">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Display:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="main.css">
</head>

<body>

    <div class="main-container">
        <div class="header-container">
            <h3 id="sunset">Sunset</h3>
            <img src="img/SunsetRoastersLogo.png" alt="sunsetroasterlogo">
            <h3 id="roasters">Roasters</h3>
            <div id="total-price"><span>0.00 TL</span></div>
            <button id="cart"><i class="fa-solid fa-bell-concierge"></i></button>
            <button id="staff"><i class="fa-solid fa-user"></i></button>
            <span>MENU | Sipariş Sistemi</span>
            <ul id="menu">
                <a id="appetizersMenu" class="menuBtns" href="">
                    <li>Başlangıçlar</li>
                </a>
                <a id="hotstartersMenu" class="menuBtns" href="">
                    <li>Ara Sıcaklar</li>
                </a>
                <a id="maincourseMenu" class="menuBtns" href="">
                    <li>Ana Yemekler</li>
                </a>
                <a id="sidedishesMenu" class="menuBtns" href="">
                    <li>Mezeler & Salatalar</li>
                </a>
                <a id="dessertsMenu" class="menuBtns" href="">
                    <li>Tatlılar</li>
                </a>
                <a id="drinksMenu" class="menuBtns" href="">
                    <li>İçecekler</li>
                </a>
            </ul>
        </div>
        <div class="body-container">

        </div>
        <div class="footer-container">

        </div>
    </div>

    <div id="staff-overlay" class="staff-overlay hidden">
        <div class="modal-content">
            <a href="#" id="closeBtn"><i class="fa-solid fa-xmark"></i></a>
            <h2>Sunset Roasters Yönetim Paneli</h2>
            <div class="staff-overlay-inputs">
                <h2 style="position: relative; top: 0.5rem;">Personel Girişi</h2>
                <div class="login-control">
                    <div class="notification"></div>
                </div>
                <div class="username">
                    <span id="person" class="tag"><i class="fa-solid fa-user"></i></span>
                    <input type="text" id="usernameInput" class="logininputs" placeholder="Kullanıcı adı">
                </div>
                <div class="password">
                    <span id="password" class="tag"><i class="fa-solid fa-key"></i></span>
                    <input type="text" id="passwordInput" class="logininputs" placeholder="Giriş şifresi">
                </div>
                <a href="#" id="login-btn">Giriş</a>
            </div>
        </div>
    </div>


    <script src="app.js"></script>
</body>

</html>
